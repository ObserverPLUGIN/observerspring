spring.application.name=observerspring
server.port=8080
management.endpoints.web.exposure.include=health,info
spring.profiles.default=local
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
observer.security.admin.username=${OBSERVER_ADMIN_USERNAME:admin}
observer.security.admin.email=${OBSERVER_ADMIN_EMAIL:admin@observer.local}
observer.security.admin.display-name=${OBSERVER_ADMIN_DISPLAY_NAME:Observer Admin}
observer.security.admin.password=${OBSERVER_ADMIN_PASSWORD:change-me-please}
observer.auth.code-expiration-minutes=${OBSERVER_AUTH_CODE_EXPIRATION_MINUTES:10}
observer.auth.expose-debug-code=${OBSERVER_AUTH_EXPOSE_DEBUG_CODE:false}
observer.mail.from=${OBSERVER_MAIL_FROM:noreply@observer.local}
